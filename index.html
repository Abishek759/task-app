<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - 3D Task & Performance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f111a;
            --primary: #6c5ce7;
            --primary-glow: rgba(108, 92, 231, 0.5);
            --secondary: #00cec9;
            --secondary-glow: rgba(0, 206, 201, 0.5);
            --surface: rgba(255, 255, 255, 0.05);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text: #f5f6fa;
            --text-muted: #a4b0be;
            --success: #00b894;
            --danger: #ff7675;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(108, 92, 231, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 206, 201, 0.15) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 2rem;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px var(--primary-glow);
            animation: float 6s ease-in-out infinite;
            margin-bottom: 0.5rem;
        }
        
        header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateZ(0); }
            50% { transform: translateY(-10px) translateZ(50px); }
        }

        .glass-card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            transform-style: preserve-3d;
            perspective: 1000px;
            display: flex;
            flex-direction: column;
        }

        .glass-card h2 {
            margin-bottom: 1.5rem;
            font-weight: 600;
            color: var(--text);
            transform: translateZ(30px);
        }

        /* Task Section */
        .task-input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            transform: translateZ(20px);
        }

        input[type="text"], input[type="date"], input[type="time"], select {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--surface-border);
            color: var(--text);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Set calendar picker icon colors */
        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.6;
            cursor: pointer;
        }
        ::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        input[type="text"]:focus, input[type="date"]:focus, input[type="time"]:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow), inset 0 2px 5px rgba(0,0,0,0.2);
            background: rgba(0,0,0,0.4);
        }

        button.add-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px var(--primary-glow);
        }

        button.add-btn:hover {
            transform: scale(1.05) translateZ(10px);
            box-shadow: 0 8px 25px var(--secondary-glow);
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
            transform: translateZ(15px);
        }
        
        /* Custom Scrollbar */
        .task-list::-webkit-scrollbar {
            width: 6px;
        }
        .task-list::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .task-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--surface-border);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-style: preserve-3d;
            animation: slideIn 0.4s ease-out forwards;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) translateZ(0); }
            to { opacity: 1; transform: translateY(0) translateZ(10px); }
        }

        .task-item:hover {
            border-color: var(--secondary);
            transform: translateX(5px) translateZ(30px) scale(1.02);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .task-item.completed {
            opacity: 0.6;
            background: rgba(0, 184, 148, 0.05);
            border-color: rgba(0, 184, 148, 0.3);
        }
        
        .task-item.completed:hover {
            opacity: 0.8;
            border-color: var(--success);
        }

        .task-item.completed span.task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .checkbox {
            appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid var(--primary);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            margin-right: 1rem;
            flex-shrink: 0;
            background: rgba(0,0,0,0.2);
        }

        .checkbox:hover {
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .checkbox:checked {
            background: var(--success);
            border-color: var(--success);
            transform: rotate(360deg) scale(1.1);
            box-shadow: 0 0 15px rgba(0, 184, 148, 0.6);
        }

        .checkbox:checked::after {
            content: '';
            position: absolute;
            top: 45%;
            left: 50%;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .task-content {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .task-text {
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        .tag {
            font-size: 0.7rem;
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            margin-left: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .delete-btn {
            background: rgba(255, 118, 117, 0.1);
            color: var(--danger);
            border: 1px solid transparent;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: var(--danger);
            color: white;
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 15px rgba(255, 118, 117, 0.6);
        }

        /* Dashboard Section */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
            transform: translateZ(20px);
        }

        .stat-box {
            background: rgba(0,0,0,0.3);
            padding: 1.5rem;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--surface-border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        
        .stat-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .stat-box:hover::before {
            opacity: 1;
        }

        .stat-box:hover {
            transform: scale(1.05) translateZ(30px);
            border-color: var(--secondary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 0 20px var(--surface-border);
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--secondary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(0, 206, 201, 0.3));
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .chart-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chart-controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            transform: translateZ(15px);
        }

        .chart-btn {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--surface-border);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text);
            transition: all 0.3s ease;
            cursor: pointer;
            font-weight: 600;
        }

        .chart-btn:hover {
            background: rgba(255,255,255,0.05);
            transform: translateY(-2px);
        }

        .chart-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            box-shadow: 0 5px 15px var(--primary-glow);
        }

        .chart-container {
            width: 100%;
            flex: 1;
            min-height: 250px;
            position: relative;
            transform: translateZ(10px);
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 1rem;
            border: 1px solid var(--surface-border);
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
            body {
                padding: 2rem 0;
            }
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>NEXUS</h1>
            <p>Protective 3D Management & Prescheduled Growth System</p>
        </header>

        <main class="glass-card" id="taskCard">
            <h2>Task Management</h2>
            <div class="task-input-group" style="flex-wrap: wrap;">
                <input type="text" id="taskInput" placeholder="Enter new task..." onkeypress="handleKeyPress(event)" style="flex: 1 1 100%;">
                <input type="date" id="taskDate" title="Schedule Date">
                <input type="time" id="taskTime" title="Schedule Time">
                <select id="taskType">
                    <option value="daily">Daily</option>
                    <option value="prescheduled">Pre-Scheduled</option>
                </select>
                <button class="add-btn" onclick="addTask()">Add Task</button>
            </div>
            <ul class="task-list" id="taskList">
                <!-- Tasks will be injected here -->
            </ul>
        </main>

        <aside class="glass-card" id="dashboardCard">
            <h2>Performance Growth</h2>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-value" id="completionRate">0%</div>
                    <div class="stat-label">Completion Rate</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="growthScore">0</div>
                    <div class="stat-label">Growth Points</div>
                </div>
            </div>

            <div class="chart-wrapper">
                <div class="chart-controls">
                    <button class="chart-btn active" onclick="updateChart('day')">Day</button>
                    <button class="chart-btn" onclick="updateChart('week')">Week</button>
                    <button class="chart-btn" onclick="updateChart('month')">Month</button>
                    <button class="chart-btn" onclick="updateChart('year')">Year</button>
                </div>
                
                <div class="chart-container">
                    <canvas id="performanceChart"></canvas>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // State
        // Set up a default date for the future
        const nextMonthDate = new Date();
        nextMonthDate.setMonth(nextMonthDate.getMonth() + 1);
        const dateString = nextMonthDate.toISOString().split('T')[0];

        let tasks = [
            { id: 1, text: "Initialize Protective Protocols", type: "prescheduled", date: "2026-05-01", time: "09:00", completed: true },
            { id: 2, text: "Review Weekly Growth Metrics", type: "daily", date: "", time: "", completed: false },
            { id: 3, text: "Optimize 3D UI Animations", type: "daily", date: "", time: "", completed: false },
            { id: 4, text: "Long-term Security Audit", type: "prescheduled", date: dateString, time: "14:30", completed: false }
        ];
        
        let chartInstance = null;
        let currentChartMode = 'day';

        // Elements
        const taskListEl = () => document.getElementById('taskList');
        const taskInputEl = () => document.getElementById('taskInput');
        const taskTypeEl = () => document.getElementById('taskType');
        const completionRateEl = () => document.getElementById('completionRate');
        const growthScoreEl = () => document.getElementById('growthScore');

        // Initialize
        function init() {
            renderTasks();
            updateStats(false); // Initial render without animation delay
            initChart();
            setup3DEffects();
        }

        // 3D Card Hover Effect
        function setup3DEffects() {
            const cards = document.querySelectorAll('.glass-card');
            
            cards.forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    // Reduced rotation for smoother feel
                    const rotateX = ((y - centerY) / centerY) * -3;
                    const rotateY = ((x - centerX) / centerX) * 3;
                    
                    card.style.transform = `perspective(1000px) translateY(-5px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
                });
                
                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'perspective(1000px) translateY(0) rotateX(0) rotateY(0)';
                });
            });
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        }

        // Add Task
        function addTask() {
            const val = taskInputEl().value.trim();
            if (!val) return;
            
            const taskDate = document.getElementById('taskDate').value;
            const taskTime = document.getElementById('taskTime').value;
            
            tasks.unshift({
                id: Date.now(),
                text: val,
                type: taskTypeEl().value,
                date: taskDate,
                time: taskTime,
                completed: false
            });
            
            taskInputEl().value = '';
            document.getElementById('taskDate').value = '';
            document.getElementById('taskTime').value = '';
            renderTasks();
            updateStats(true);
        }

        // Toggle Task Completion
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if(task) {
                task.completed = !task.completed;
                renderTasks();
                updateStats(true);
            }
        }

        // Delete Task
        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            renderTasks();
            updateStats(true);
        }

        // Render Tasks
        function renderTasks() {
            const container = taskListEl();
            container.innerHTML = tasks.map(task => `
                <li class="task-item ${task.completed ? 'completed' : ''}">
                    <div class="task-content">
                        <input type="checkbox" class="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})">
                        <div style="display:flex; flex-direction:column; gap:4px;">
                            <span class="task-text">${task.text}</span>
                            ${task.date || task.time ? `<span style="font-size: 0.75rem; color: var(--text-muted);">Scheduled: ${task.date || ''} ${task.time || ''}</span>` : ''}
                        </div>
                        <span class="tag" style="background: ${task.type === 'prescheduled' ? 'var(--secondary)' : 'var(--primary)'}; color: ${task.type === 'prescheduled' ? '#000' : '#fff'}">${task.type}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})" title="Remove Task">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </li>
            `).join('');
        }

        // Update Stats
        function updateStats(animate = true) {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const rate = total === 0 ? 0 : Math.round((completed / total) * 100);
            
            // Calculate growth: +15 for prescheduled, +10 for daily
            let growth = 0;
            tasks.forEach(t => {
                if(t.completed) {
                    growth += t.type === 'prescheduled' ? 25 : 10;
                }
            });
            
            if(animate) {
                animateValue(completionRateEl(), rate, '%');
                animateValue(growthScoreEl(), growth, '');
            } else {
                completionRateEl().innerText = rate + '%';
                growthScoreEl().innerText = growth;
            }
            
            // Update chart dynamically if on 'day' view
            if(chartInstance && currentChartMode === 'day') {
                const dataArr = chartInstance.data.datasets[0].data;
                dataArr[dataArr.length - 1] = rate; // Update the 'Now' datapoint
                chartInstance.update();
            }
        }

        // Number Animation Helper
        function animateValue(obj, end, suffix) {
            let start = parseInt(obj.innerText.replace(/\D/g, '')) || 0;
            if (start === end) return;
            
            const duration = 1000;
            const range = Math.abs(end - start);
            const stepTime = Math.max(Math.floor(duration / range), 20);
            
            const timer = setInterval(() => {
                if (start < end) start += 1;
                else if (start > end) start -= 1;
                
                obj.innerText = start + suffix;
                
                if (start === end) {
                    clearInterval(timer);
                }
            }, stepTime);
        }

        // Chart.js Setup
        function initChart() {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            
            // Global Chart config
            Chart.defaults.color = '#a4b0be';
            Chart.defaults.font.family = 'Outfit';
            
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: getChartData('day'),
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 17, 26, 0.9)',
                            titleFont: { size: 14, family: 'Outfit' },
                            bodyFont: { size: 13, family: 'Outfit' },
                            padding: 12,
                            cornerRadius: 8,
                            borderColor: 'rgba(108, 92, 231, 0.5)',
                            borderWidth: 1,
                            displayColors: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            grid: { 
                                color: 'rgba(255,255,255,0.05)',
                                drawBorder: false
                            },
                            ticks: {
                                callback: function(value) { return value + '%' }
                            }
                        },
                        x: {
                            grid: { 
                                color: 'rgba(255,255,255,0.05)',
                                drawBorder: false 
                            }
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index',
                    },
                    animation: {
                        duration: 1000,
                        easing: 'easeOutQuart'
                    }
                }
            });
        }

        function getChartData(timeframe) {
            const ctx = document.getElementById('performanceChart').getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, 'rgba(108, 92, 231, 0.6)');
            gradient.addColorStop(1, 'rgba(108, 92, 231, 0.0)');

            let labels, data;
            
            // Current completion rate for dynamic 'Now' updating
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const currentRate = total === 0 ? 0 : Math.round((completed / total) * 100);

            if(timeframe === 'day') {
                labels = ['9 AM','11 AM','1 PM','3 PM','5 PM','7 PM', 'Now'];
                data = [10, 20, 35, 50, 65, 80, currentRate]; 
            } else if (timeframe === 'week') {
                labels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
                data = [40, 65, 55, 80, 90, 75, currentRate];
            } else if (timeframe === 'month') {
                labels = ['Week 1', 'Week 2', 'Week 3', 'Current'];
                data = [50, 70, 85, currentRate];
            } else if (timeframe === 'year') {
                labels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                const yearData = [20, 35, 45, 60, 65, 75, 80, 85, 90, 88, 92, 95];
                // Update current month with live data
                const monthIndex = new Date().getMonth();
                yearData[monthIndex] = currentRate;
                data = yearData;
            }
            
            return {
                labels,
                datasets: [{
                    label: 'Completion %',
                    data,
                    borderColor: '#6c5ce7',
                    backgroundColor: gradient,
                    borderWidth: 3,
                    pointBackgroundColor: '#0f111a',
                    pointBorderColor: '#00cec9',
                    pointBorderWidth: 2,
                    pointRadius: 5,
                    pointHoverRadius: 8,
                    pointHoverBackgroundColor: '#00cec9',
                    pointHoverBorderColor: '#fff',
                    fill: true,
                    tension: 0.4
                }]
            };
        }

        function updateChart(timeframe) {
            currentChartMode = timeframe;
            
            // Update active button styling
            document.querySelectorAll('.chart-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === timeframe) {
                    btn.classList.add('active');
                }
            });

            // Update chart data with animation
            chartInstance.data = getChartData(timeframe);
            chartInstance.update();
        }

        // Boot
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
